name: Release

run-name: >-
  ${{ inputs.dry_run && 'Release dry-run' || 'Release' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to prepare, for example v1.2.3"
        required: true
        type: string
      dry_run:
        description: "Build and validate artifacts without publishing a GitHub Release or npm packages"
        required: true
        default: true
        type: boolean
      confirm_repository:
        description: "Type customerio/cli to confirm the target repository"
        required: true
        type: string
      confirm_npm_package:
        description: "Type @customerio/cli to confirm the root npm package"
        required: true
        type: string
      resume_existing_npm:
        description: "Resume npm publish by skipping already-published matching package versions"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  dry-run:
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
          CONFIRM_REPOSITORY: ${{ inputs.confirm_repository }}
          CONFIRM_NPM_PACKAGE: ${{ inputs.confirm_npm_package }}
          RESUME_EXISTING_NPM: ${{ inputs.resume_existing_npm }}
        run: |
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use the exact vX.Y.Z format"
            exit 1
          fi
          if [[ "$CONFIRM_REPOSITORY" != "customerio/cli" ]]; then
            echo "confirm_repository must be customerio/cli"
            exit 1
          fi
          if [[ "$CONFIRM_NPM_PACKAGE" != "@customerio/cli" ]]; then
            echo "confirm_npm_package must be @customerio/cli"
            exit 1
          fi
          if [[ "$RESUME_EXISTING_NPM" == "true" ]]; then
            echo "resume_existing_npm is only valid for real npm publish recovery"
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "release dry-run must be dispatched from refs/heads/main"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Assert checkout ref
        run: |
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "checked-out commit does not match dispatch SHA"
            exit 1
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@customerio"

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goreleaser-dist
          path: dist/

      - name: Prepare npm packages
        env:
          VERSION: ${{ inputs.version }}
        run: node .github/scripts/prepare-npm-packages.js --pack-dry-run

      - name: Validate package metadata
        env:
          VERSION: ${{ inputs.version }}
        run: node .github/scripts/publish-npm.js --check

      - name: Validate npm publish command
        env:
          VERSION: ${{ inputs.version }}
        run: node .github/scripts/publish-npm.js --dry-run

  github_release:
    if: ${{ !inputs.dry_run && !inputs.resume_existing_npm }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Validate version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
          CONFIRM_REPOSITORY: ${{ inputs.confirm_repository }}
          CONFIRM_NPM_PACKAGE: ${{ inputs.confirm_npm_package }}
        run: |
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use the exact vX.Y.Z format"
            exit 1
          fi
          if [[ "$CONFIRM_REPOSITORY" != "customerio/cli" ]]; then
            echo "confirm_repository must be customerio/cli"
            exit 1
          fi
          if [[ "$CONFIRM_NPM_PACKAGE" != "@customerio/cli" ]]; then
            echo "confirm_npm_package must be @customerio/cli"
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/tags/$VERSION_INPUT" ]]; then
            echo "real release must be dispatched from refs/tags/$VERSION_INPUT"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Assert checkout and tag ref
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "checked-out commit does not match dispatch SHA"
            exit 1
          fi
          git fetch --force origin "refs/tags/$VERSION_INPUT:refs/tags/$VERSION_INPUT"
          if [[ "$(git rev-list -n 1 "refs/tags/$VERSION_INPUT")" != "$GITHUB_SHA" ]]; then
            echo "tag $VERSION_INPUT no longer resolves to dispatch SHA"
            exit 1
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goreleaser-dist
          path: dist/

  npm_resume_build:
    if: ${{ !inputs.dry_run && inputs.resume_existing_npm }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Validate version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
          CONFIRM_REPOSITORY: ${{ inputs.confirm_repository }}
          CONFIRM_NPM_PACKAGE: ${{ inputs.confirm_npm_package }}
        run: |
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use the exact vX.Y.Z format"
            exit 1
          fi
          if [[ "$CONFIRM_REPOSITORY" != "customerio/cli" ]]; then
            echo "confirm_repository must be customerio/cli"
            exit 1
          fi
          if [[ "$CONFIRM_NPM_PACKAGE" != "@customerio/cli" ]]; then
            echo "confirm_npm_package must be @customerio/cli"
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/tags/$VERSION_INPUT" ]]; then
            echo "npm publish recovery must be dispatched from refs/tags/$VERSION_INPUT"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Assert checkout and tag ref
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "checked-out commit does not match dispatch SHA"
            exit 1
          fi
          git fetch --force origin "refs/tags/$VERSION_INPUT:refs/tags/$VERSION_INPUT"
          if [[ "$(git rev-list -n 1 "refs/tags/$VERSION_INPUT")" != "$GITHUB_SHA" ]]; then
            echo "tag $VERSION_INPUT no longer resolves to dispatch SHA"
            exit 1
          fi

      - name: Assert GitHub Release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if ! release="$(
            gh release view "$VERSION_INPUT" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft,tagName,url \
              --jq '[.tagName, (.isDraft | tostring), .url] | @tsv'
          )"; then
            echo "resume_existing_npm requires an existing non-draft GitHub Release for $VERSION_INPUT"
            exit 1
          fi

          IFS=$'\t' read -r tag_name is_draft url <<<"$release"
          if [[ "$tag_name" != "$VERSION_INPUT" ]]; then
            echo "GitHub Release tag $tag_name does not match $VERSION_INPUT"
            exit 1
          fi
          if [[ "$is_draft" == "true" ]]; then
            echo "GitHub Release $VERSION_INPUT is still a draft"
            exit 1
          fi
          echo "Resuming npm publish after existing GitHub Release: $url"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goreleaser-dist
          path: dist/

  npm_publish:
    needs:
      - github_release
      - npm_resume_build
    if: >-
      ${{
        always() &&
        !inputs.dry_run &&
        (
          needs.github_release.result == 'success' ||
          needs.npm_resume_build.result == 'success'
        )
      }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
          CONFIRM_REPOSITORY: ${{ inputs.confirm_repository }}
          CONFIRM_NPM_PACKAGE: ${{ inputs.confirm_npm_package }}
        run: |
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use the exact vX.Y.Z format"
            exit 1
          fi
          if [[ "$CONFIRM_REPOSITORY" != "customerio/cli" ]]; then
            echo "confirm_repository must be customerio/cli"
            exit 1
          fi
          if [[ "$CONFIRM_NPM_PACKAGE" != "@customerio/cli" ]]; then
            echo "confirm_npm_package must be @customerio/cli"
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/tags/$VERSION_INPUT" ]]; then
            echo "real npm publish must be dispatched from refs/tags/$VERSION_INPUT"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Assert checkout and tag ref
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "checked-out commit does not match dispatch SHA"
            exit 1
          fi
          git fetch --force origin "refs/tags/$VERSION_INPUT:refs/tags/$VERSION_INPUT"
          if [[ "$(git rev-list -n 1 "refs/tags/$VERSION_INPUT")" != "$GITHUB_SHA" ]]; then
            echo "tag $VERSION_INPUT no longer resolves to dispatch SHA"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@customerio"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: goreleaser-dist
          path: dist/

      - name: Prepare npm packages
        env:
          VERSION: ${{ inputs.version }}
        run: node .github/scripts/prepare-npm-packages.js

      - name: Publish npm packages
        env:
          VERSION: ${{ inputs.version }}
          RESUME_EXISTING_NPM: ${{ inputs.resume_existing_npm }}
        run: |
          args=()
          if [[ "$RESUME_EXISTING_NPM" == "true" ]]; then
            args+=(--resume-existing)
          fi
          node .github/scripts/publish-npm.js "${args[@]}"
